name: Deploy report to GitHub Pages

# content/ の Markdown と figures/ から自己完結型 HTML を生成し、GitHub Pages に公開する。
# DP 合成データの再生成は不要（重い依存は使わず、markdown だけでビルド）。

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "figures/**"
      - "scripts/03_build_html.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: pip install markdown pygments

      - name: Build site (htmls/index.html)
        run: python scripts/03_build_html.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: htmls

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
